[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# 模式匹配
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 最小 Python 版本
minversion = 8.0

# 命令行选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src/jlink_mcp
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=60

# 标记定义
markers =
    unit: 单元测试（不依赖硬件）
    integration: 集成测试（需要硬件）
    mock: Mock 测试
    slow: 慢速测试
    svd: SVD 相关测试
    memory: 内存操作测试
    flash: Flash 操作测试
    rtt: RTT 测试
    gdb: GDB Server 测试
    connection: 连接管理测试
    device_info: 设备信息测试
    benchmark: 性能基准测试（使用 pytest-benchmark）
    performance: 性能测试

# 覆盖率配置
[coverage:run]
source = src/jlink_mcp
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
skip_covered = False
show_missing = True

[coverage:html]
directory = htmlcov